services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: football_ai
      MYSQL_USER: football
      MYSQL_PASSWORD: football_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ufootball", "-pfootball_password"]
      interval: 10s
      timeout: 5s
      retries: 15

  db-init:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      DATABASE_URL: mysql://football:football_password@mysql:3306/football_ai
    command: ["npm", "run", "db:push"]
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: mysql://football:football_password@mysql:3306/football_ai
      API_HOST: 0.0.0.0
      API_PORT: 4000
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:4000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: mysql://football:football_password@mysql:3306/football_ai
    depends_on:
      db-init:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    environment:
      INTERNAL_API_URL: http://api:4000/api
      NEXT_PUBLIC_SITE_NAME: Football Value AI
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  mysql_data:
