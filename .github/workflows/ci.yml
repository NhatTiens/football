name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: football_ai
          MYSQL_USER: football
          MYSQL_PASSWORD: football_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ufootball -pfootball_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: mysql://football:football_password@127.0.0.1:3306/football_ai
      API_FOOTBALL_KEY: test
      ADMIN_API_TOKEN: test-admin-token
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run db:push
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
